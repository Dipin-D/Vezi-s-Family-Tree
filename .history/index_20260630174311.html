    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Lora', 'serif'],
                        sans: ['Inter', 'sans-serif'],

    <style>
        body {
            background-color: #F5F5F4;
            background-image: radial-gradient(#d6d3d1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 
         * CSS Bracket Magic for Visual Trees
         * This creates the perfectly aligned connecting lines without SVGs
         */
        .genealogy-tree ul {
            padding-top: 24px; position: relative;
            display: flex; justify-content: center;
            transition: all 0.3s;
        }
        .genealogy-tree li {
            text-align: center; list-style-type: none;
            position: relative; padding: 24px 12px 0 12px;
            transition: all 0.3s;
        }
        /* Top brackets connecting siblings */
        .genealogy-tree li::before, .genealogy-tree li::after {
            content: ''; position: absolute; top: 0; right: 50%;
            border-top: 2px solid #a8a29e; width: 50%; height: 24px;
        }
        .genealogy-tree li::after {
            right: auto; left: 50%; border-left: 2px solid #a8a29e;
        }
        /* Remove brackets for only children or roots */
        .genealogy-tree li:only-child::after, .genealogy-tree li:only-child::before {
            display: none;
        }
        .genealogy-tree li:only-child { padding-top: 0; }
        /* Clean up end nodes */
        .genealogy-tree li:first-child::before, .genealogy-tree li:last-child::after {
            border: 0 none;
        }
        .genealogy-tree li:last-child::before {
            border-right: 2px solid #a8a29e; border-radius: 0 6px 0 0;
        }
        .genealogy-tree li:first-child::after {
            border-radius: 6px 0 0 0;
        }
        /* Downward line from parents */
        .genealogy-tree ul ul::before {
            content: ''; position: absolute; top: 0; left: 50%;
            border-left: 2px solid #a8a29e; width: 0; height: 24px;
        }

        /* Interactive Map Grabbing */
        .cursor-grab { cursor: -webkit-grab; cursor: grab; }
        .cursor-grabbing { cursor: -webkit-grabbing !important; cursor: grabbing !important; }

        /* Hide Scrollbars for cleaner map view */
        #tree-container::-webkit-scrollbar { display: none; }
        #tree-container { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

            document.getElementById('tree-mount').innerHTML = html;

            const isRoot = member.id === 'mtalisi';

                </div>
            `;

            let childrenIds = [];
            if (member.wives) {
                member.wives.forEach(w => childrenIds.push(...w.children));
            }

            if (childrenIds.length > 0) {
                const isExpanded = expandedNodes.has(id);
                
                // Toggle Button
                html += `
                    <button onclick="toggleExpand('${id}')" class="absolute -bottom-3 left-1/2 -translate-x-1/2 w-6 h-6 bg-white border border-stone-300 rounded-full flex items-center justify-center text-stone-600 hover:text-amber-600 hover:border-amber-600 text-sm shadow-sm z-10 transition-colors focus:outline-none">
                        ${isExpanded ? '−' : '＋'}
                    </button>
                `;
                html += `</div>`; // Close inline-block

                // Render Children Branches
                if (isExpanded) {
                    html += `<ul>`;
                    
                    if (isRoot) {
                        // Root Level: Group strictly by the 4 Houses
                        member.wives.forEach((wife, wIdx) => {
                            html += `<li>`;
                            html += `
                                <div class="inline-block">
                                    <div class="bg-stone-200 border border-stone-300 text-stone-700 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-3 shadow-sm">
                                        House ${wIdx + 1}: ${wife.name.split('(')[0].trim()}
                                    </div>
                                </div>
                            `;
                            if (wife.children.length > 0) {
                                html += `<ul>`;
                                wife.children.forEach(cId => { html += renderNode(cId); });
                                html += `</ul>`;
                            }
                            html += `</li>`;
                        });
                    } else {
                        // General Generational Level: Group by mother if multiple wives exist
                        if (member.wives.length > 1) {
                            member.wives.forEach((wife) => {
                                if (wife.children.length > 0) {
                                    html += `<li>`;
                                    html += `
                                        <div class="inline-block">
                                            <div class="bg-stone-100 border border-stone-200 text-stone-500 px-2 py-0.5 rounded-full text-[9px] font-semibold uppercase tracking-wider mb-2">
                                                With ${wife.name.split('(')[0].trim()}
                                            </div>
                                        </div>
                                    `;
                                    html += `<ul>`;
                                    wife.children.forEach(cId => { html += renderNode(cId); });
                                    html += `</ul>`;
                                    html += `</li>`;
                                }
                            });
                        } else {
                            // Only 1 wife, render children flatly
                            member.wives.forEach(wife => {
                                wife.children.forEach(cId => { html += renderNode(cId); });
                            });
                        }
                    }
                    html += `</ul>`;
                }
            } else {
                html += `</div>`; // Close inline-block for childless nodes
            }

            html += `</li>`;
            return html;
        }

        // Interactions
        function toggleExpand(id) {
            if (expandedNodes.has(id)) {
                expandedNodes.delete(id);
            } else {
                expandedNodes.add(id);
            }
            renderTree();
        }

        // Map Zoom Controls
        let currentScale = 1;
        function zoomTree(direction) {
            const mount = document.getElementById('tree-mount');
            if (direction === 'in' && currentScale < 1.5) currentScale += 0.1;
            if (direction === 'out' && currentScale > 0.5) currentScale -= 0.1;
            mount.style.transform = `scale(${currentScale})`;
        }

        // Modal Engine
        function openModal(id) {
            const member = familyData[id];
            currentModalId = id;

            // Populate Text
            document.getElementById('modal-name').innerText = member.name;
            const rom = member.gen === 1 ? 'I' : member.gen === 2 ? 'II' : 'III';
            document.getElementById('modal-gen').innerText = `Generation ${rom}`;
            
            if(member.id === 'mtalisi') {
                document.getElementById('modal-parents').innerText = 'Founding Ancestor';
            } else {
                const mom = member.mother ? member.mother.split('(')[0].trim() : '?';
                document.getElementById('modal-parents').innerText = `Child of ${member.father} & ${mom}`;
            }

            // Populate Spouses
            const spList = document.getElementById('modal-spouses');
            const spWrap = document.getElementById('modal-spouses-wrapper');
            spList.innerHTML = '';
            
            if (member.wives && member.wives.length > 0) {
                spWrap.classList.remove('hidden');
                member.wives.forEach(w => {
                    spList.innerHTML += `
                        <li class="bg-stone-50 border border-stone-200 rounded-lg px-4 py-2 text-sm text-stone-700 font-medium flex justify-between items-center">
                            <span>${w.name}</span>
                            <span class="text-[10px] uppercase text-stone-400 tracking-wider">${w.children.length} Children</span>
                        </li>
                    `;
                });
            } else {
                spWrap.classList.add('hidden');
            }

            // Populate Children
            const chList = document.getElementById('modal-children');
            const chWrap = document.getElementById('modal-children-wrapper');
            chList.innerHTML = '';
            
            let allChildren = [];
            if (member.wives) {
                member.wives.forEach(w => allChildren.push(...w.children));
            }

            if (allChildren.length > 0) {
                chWrap.classList.remove('hidden');
                allChildren.forEach(cId => {
                    const child = familyData[cId];
                    if (child) {
                        const isLate = child.status === 'late';
                        chList.innerHTML += `
                            <button onclick="openModal('${cId}')" class="px-3 py-1.5 bg-white border border-stone-200 hover:border-amber-400 hover:shadow-sm rounded-lg text-xs font-serif font-medium transition-all ${isLate ? 'text-stone-400 line-through' : 'text-ink-dark'}">
                                ${child.name}
                            </button>
                        `;
                    }
                });
            } else {
                chWrap.classList.add('hidden');
            }

            // Populate Notes
            document.getElementById('modal-note').value = localStorage.getItem(`note_${id}`) || '';

            // Show Modal with Animation
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            overlay.classList.remove('hidden');
            // Small delay to allow display:block to apply before animating opacity
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        function closeModal(event) {
            // Close if clicking the background overlay
            if (event.target.id === 'modal-overlay') {
                forceCloseModal();
            }
        }

        function forceCloseModal() {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            
            overlay.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }

        // Google-Maps-Style Drag to Pan functionality
        function setupDragToPan() {
            const slider = document.getElementById('tree-container');
            let isDown = false;
            let startX, startY;
            let scrollLeft, scrollTop;

            slider.addEventListener('mousedown', (e) => {
                // Prevent drag if they are clicking a card (button or interactive div inside)
                if (e.target.closest('.node-card') || e.target.closest('button')) return;
                
                isDown = true;
                slider.classList.add('cursor-grabbing');
                startX = e.pageX - slider.offsetLeft;
                startY = e.pageY - slider.offsetTop;
                scrollLeft = slider.scrollLeft;
                scrollTop = slider.scrollTop;
            });
            
            slider.addEventListener('mouseleave', () => {
                isDown = false;
                slider.classList.remove('cursor-grabbing');
            });
            
            slider.addEventListener('mouseup', () => {
                isDown = false;
                slider.classList.remove('cursor-grabbing');
            });
            
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const y = e.pageY - slider.offsetTop;
                const walkX = (x - startX) * 1.5; // Scroll speed multiplier
                const walkY = (y - startY) * 1.5;
                slider.scrollLeft = scrollLeft - walkX;
                slider.scrollTop = scrollTop - walkY;
            });
        }
    </script>
</body>
</html>
