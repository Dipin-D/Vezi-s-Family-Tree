            "rose": { id: "rose", name: "Rose", gen: 3, father: "philemon", mother: "Ma Nyembezi", house: "house4" }, "hopewell": { id: "hopewell", name: "Hopewell", gen: 3, father: "philemon", mother: "MaSibanda", house: "house4" }, "irine": { id: "irine", name: "Irine", gen: 3, father: "philemon", mother: "MaSibanda", house: "house4" }, "charm": { id: "charm", name: "Charm", gen: 3, father: "philemon", mother: "MaSibanda", house: "house4" }, "thembinkosi": { id: "thembinkosi", name: "Thembinkosi", gen: 3, father: "philemon", mother: "MaSibanda", house: "house4" }, "doughton": { id: "doughton", name: "Doughton", gen: 3, father: "philemon", mother: "MaSibanda", house: "house4" }, "danford": { id: "danford", name: "Danford", gen: 3, father: "philemon", mother: "MaSibanda", house: "house4" }, "brighton": { id: "brighton", name: "Brighton", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "simangaliphi": { id: "simangaliphi", name: "Simangaliphi", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "silindelumusa": { id: "silindelumusa", name: "Silindelumusa", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "sikhathele": { id: "sikhathele", name: "Sikhathele", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "ntombizodwa": { id: "ntombizodwa", name: "Ntombizodwa", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "xolani": { id: "xolani", name: "Xolani", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "cleopas": { id: "cleopas", name: "Cleopas", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "last": { id: "last", name: "Last", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "painford": { id: "painford", name: "Painford", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "onias": { id: "onias", name: "Onias", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "bowen": { id: "bowen", name: "Bowen", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "tholakele": { id: "tholakele", name: "Tholakele", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "siduduzile": { id: "siduduzile", name: "Siduduzile", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "sithulisiwe": { id: "sithulisiwe", name: "Sithulisiwe", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "obvious": { id: "obvious", name: "Obvious", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "mkhululi": { id: "mkhululi", name: "Mkhululi", gen: 3, father: "philemon", mother: "Ma Moyo", house: "house4" }
        };

        let currentActiveDossierId = null;

        /* INITIALIZATION */
        window.onload = function() {
            renderFocusNode('mtalisi');
            updateDirectory();
        };

        /* TAB NAVIGATION SYSTEM */
        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('bg-archive-900', 'text-white', 'shadow-md');
                el.classList.add('text-archive-700', 'hover:bg-archive-100');
            });
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            const btn = document.getElementById(`tab-${tabId}`);
            btn.classList.add('bg-archive-900', 'text-white', 'shadow-md');
            btn.classList.remove('text-archive-700', 'hover:bg-archive-100');
        }

        /* 1. LINEAGE FOCUS EXPLORER */
        function renderFocusNode(memberId) {
            const canvas = document.getElementById('focus-canvas');
            const member = familyData[memberId];
            if(!member) return;

            currentActiveDossierId = memberId;

            // Trigger fade out
            canvas.classList.remove('fade-in');
            canvas.classList.add('fade-out');

            setTimeout(() => {
                let html = '';

                // A. PARENTS TIER
                if(member.father) {
                    const fatherObj = familyData[member.father];
                    html += `
                        <div class="flex flex-col items-center relative z-10 w-full">
                            <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] text-archive-400 mb-6 border-b border-archive-200 pb-2">Ancestry</h3>
                            <div class="flex gap-4 md:gap-8 justify-center relative w-full max-w-2xl conn-bracket">
                                ${fatherObj ? 
                                    createNodeCard(fatherObj.id, 'Father') : 
                                    `<div class="bg-white/50 border border-archive-200 rounded-2xl px-6 py-4 text-center opacity-60"><span class="block font-serif text-lg text-archive-800">${member.father}</span></div>`
                                }
                                ${member.mother ? 
                                    `<div class="bg-white/50 border border-archive-200 rounded-2xl px-6 py-4 text-center opacity-60"><span class="block font-serif text-lg text-archive-800">${member.mother}</span></div>` : ''
                                }
                                <div class="conn-line-down"></div>
                            </div>
                        </div>
                    `;
                }

                // B. FOCUS TIER (SELF + SPOUSES + NOTES)
                html += `<div class="flex flex-col items-center relative z-20 mt-4 w-full">`;
                html += `<div class="flex flex-col md:flex-row items-center justify-center gap-6 ${member.father ? 'conn-line-up' : ''} ${member.wives ? 'conn-line-down' : ''} w-full max-w-4xl">`;
                
                // Self Hero Card + Editable Notes integrated directly into the focus area
                const genRoman = member.gen === 1 ? 'I' : member.gen === 2 ? 'II' : 'III';
                
                // Fetch saved note
                const savedNote = localStorage.getItem(`note_${memberId}`) || '';

                html += `
                    <div class="bg-gradient-to-br from-archive-900 to-archive-950 text-white rounded-[2rem] shadow-2xl shadow-archive-900/30 border border-archive-800 w-full max-w-lg overflow-hidden transform scale-105 z-30">
                        
                        <div class="p-8 text-center border-b border-archive-800/50">
                            <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-archive-300 mb-2 block">Generation ${genRoman}</span>
                            <h2 class="font-serif text-3xl md:text-4xl font-bold mb-1">${member.name}</h2>
                            ${member.id === 'mtalisi' ? `<p class="text-archive-400 text-xs italic font-serif mt-2">The Patriarch</p>` : ''}
                        </div>
                        
                        <!-- End-User Edit Area directly on the main card -->
                        <div class="bg-archive-100 border-t border-archive-200 p-6">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-xs font-bold uppercase tracking-wider text-archive-600">Resting Place & Private Notes</label>
                                <span class="text-[10px] text-archive-400 italic">Saved automatically to your device</span>
                            </div>
                            <textarea id="modal-note-area" oninput="saveActiveNote()" placeholder="Enter deceased location, dates, or private annotations here..." class="w-full h-24 bg-white border border-archive-300 rounded-xl p-3 text-sm text-archive-900 focus:ring-2 focus:ring-archive-400 focus:outline-none resize-none shadow-inner">${savedNote}</textarea>
                            <div class="flex justify-end">
                                <button onclick="clearActiveNote()" class="mt-2 text-[10px] text-archive-400 hover:text-red-600 font-medium transition-colors">Clear Note</button>
                            </div>
                        </div>

                    </div>
                `;

                // Spouses (if any) attached to the side
                if (member.wives && member.wives.length > 0) {
                    html += `<div class="hidden md:flex flex-col gap-3">`;
                    member.wives.forEach((w, i) => {
                        html += `
                            <div class="bg-white border-2 border-archive-100 rounded-2xl px-5 py-3 shadow-sm flex items-center gap-3">
                                <span class="w-6 h-6 rounded-full bg-archive-100 text-archive-500 flex items-center justify-center text-xs">💍</span>
                                <span class="font-serif font-medium text-archive-900">${w.name}</span>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                html += `</div></div>`;

                // C. CHILDREN TIER
                let childrenFound = false;
                if (member.wives) {
                    html += `<div class="flex flex-col items-center w-full mt-8 relative z-10">`;
                    html += `<h3 class="text-[10px] font-bold uppercase tracking-[0.2em] text-archive-400 mb-8 border-b border-archive-200 pb-2">Descendants</h3>`;
                    html += `<div class="flex flex-wrap justify-center gap-4 md:gap-8 max-w-5xl w-full conn-bracket">`;
                    
                    member.wives.forEach(w => {
                        w.children.forEach(cId => {
                            childrenFound = true;
                            html += createNodeCard(cId, 'Child');
                        });
                    });
                    html += `</div></div>`;
                }

                // If no children but they are Gen 3
                if (!childrenFound && member.gen === 3) {
                    html += `
                        <div class="mt-8 text-center text-archive-400 italic text-sm">
                            End of documented lineage for this branch.
                        </div>
                    `;
                }

                canvas.innerHTML = html;
                
                // Fade back in
                requestAnimationFrame(() => {
                    canvas.classList.remove('fade-out');
                    canvas.classList.add('fade-in');
                });
            }, 300); // match transition duration
        }

        function createNodeCard(id, label) {
            const m = familyData[id];
            if(!m) return '';
            return `
                <div onclick="renderFocusNode('${id}')" class="bg-white border-2 border-archive-200 hover:border-archive-500 rounded-2xl px-6 py-4 shadow-sm hover:shadow-xl transition-all cursor-pointer text-center w-36 md:w-44 flex flex-col items-center justify-center transform hover:-translate-y-1 group">
                    <h4 class="font-serif text-lg font-bold text-archive-900 group-hover:text-archive-600 transition-colors leading-tight">${m.name.split(' ')[0]}</h4>
                    <span class="text-[9px] uppercase tracking-widest text-archive-400 mt-2 font-semibold">Gen ${m.gen}</span>
                </div>
            `;
        }

        /* 2. COMPLETE REGISTRY */
        function updateDirectory() {
            const query = document.getElementById('dir-search').value.toLowerCase();
            const sort = document.getElementById('dir-sort').value;
            const grid = document.getElementById('registry-grid');
            
            let arr = Object.values(familyData).filter(m => 
                m.name.toLowerCase().includes(query) || 
                (m.mother && m.mother.toLowerCase().includes(query)) ||
                (m.father && m.father.toLowerCase().includes(query))
            );

            if(sort === 'az') arr.sort((a,b) => a.name.localeCompare(b.name));
            else arr.sort((a,b) => a.gen - b.gen);

            grid.innerHTML = '';
            if(arr.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-archive-400">No relatives found matching "${query}".</div>`;
                return;
            }

            arr.forEach(m => {
                grid.innerHTML += `
                    <div onclick="renderFocusNode('${m.id}'); switchTab('explorer');" class="bg-archive-50 hover:bg-archive-100 border border-archive-200 rounded-2xl p-5 cursor-pointer transition-all hover:shadow-md group">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-serif font-bold text-lg text-archive-950 group-hover:text-archive-600">${m.name}</h4>
                            <span class="bg-white border border-archive-200 text-archive-600 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider">Gen ${m.gen}</span>
                        </div>
                        <div class="text-xs text-archive-500 space-y-1">
                            <p><strong>Father:</strong> ${m.father || '-'}</p>
                            <p><strong>Mother:</strong> ${m.mother ? m.mother.split('(')[0] : '-'}</p>
                        </div>
                    </div>
                `;
            });
        }

        /* Notes Management */
        function saveActiveNote() {
            if (currentActiveDossierId) {
                const noteText = document.getElementById('modal-note-area').value;
                localStorage.setItem(`note_${currentActiveDossierId}`, noteText);
            }
        }

        function clearActiveNote() {
            if (currentActiveDossierId) {
                document.getElementById('modal-note-area').value = '';
                localStorage.removeItem(`note_${currentActiveDossierId}`);
            }
        }
    </script>
</body>
