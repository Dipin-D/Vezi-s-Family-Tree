    <style>
        body { 
            background-color: #0A0A0A; 
            color: #F5F5F5;
        }
        
        /* Ndebele Geometric Top Band */
        .ndebele-stripe {
            background: linear-gradient(to right, 
                #E32636 0%, #E32636 16.6%, 
                #005BA6 16.6%, #005BA6 33.3%, 
                #FFD700 33.3%, #FFD700 50%, 
                #F5F5F5 50%, #F5F5F5 66.6%, 
                #007A33 66.6%, #007A33 83.3%, 
                #E32636 83.3%, #E32636 100%);
            height: 6px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        /* Modern Neo-Brutalist Panels (Inspired by the flat shapes of Ndebele Art) */
        .glass-panel {
            background: #141414;
            border: 3px solid #333;
            box-shadow: 12px 12px 0px 0px #005BA6; /* Solid geometric shadow */
        }

        .glass-card {
            background: #1A1A1A;
            border: 2px solid #333;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            background: #0A0A0A;
            border-color: #F5F5F5;
            transform: translate(-6px, -6px);
            box-shadow: 8px 8px 0px 0px #E32636;
        }

        /* Stark Contrast Lineage Connectors (Inspired by the black/white shield) */
        .conn-line-down::after { 
            content: ''; position: absolute; bottom: -28px; left: 50%; width: 2px; height: 28px; 
            background: #F5F5F5; 
            transform: translateX(-50%); 
        }
        .conn-line-up::before { 
            content: ''; position: absolute; top: -28px; left: 50%; width: 2px; height: 28px; 
            background: #F5F5F5; 
            transform: translateX(-50%); 
        }
        .conn-bracket::before { 
            content: ''; position: absolute; top: -28px; left: 15%; right: 15%; height: 2px; 
            background: #F5F5F5; 
        }
        
        /* Scrollbars */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #0A0A0A; border-left: 1px solid #333; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #FFD700; }
        
        /* Animations */
        .explorer-canvas { transition: opacity 0.4s ease, transform 0.4s ease; }
        .fade-out { opacity: 0; transform: scale(0.98); }
        .fade-in { opacity: 1; transform: scale(1); }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        .save-indicator { animation: fadeOut 2s forwards; }
    </style>

        /* --- THREE.JS BACKGROUND ANIMATION: GEOMETRIC HERITAGE --- */
        const initBackground = () => {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 60;

            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Ndebele Palette for 3D objects
            const colors = [0xE32636, 0x005BA6, 0xFFD700, 0x007A33, 0xF5F5F5];
            const shapes = [];

            for(let i = 0; i < 45; i++) {
                // Alternate between geometric primitives (Diamonds and Cubes)
                const isDiamond = Math.random() > 0.5;
                const size = Math.random() * 2 + 1;
                
                const geometry = isDiamond ? 
                    new THREE.OctahedronGeometry(size, 0) : 
                    new THREE.BoxGeometry(size, size, size);

                const material = new THREE.MeshBasicMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)],
                    wireframe: Math.random() > 0.6 // Mix of solid shapes and structured wireframes
                });

                const mesh = new THREE.Mesh(geometry, material);
                
                mesh.position.x = (Math.random() - 0.5) * 160;
                mesh.position.y = (Math.random() - 0.5) * 160;
                mesh.position.z = (Math.random() - 0.5) * 100 - 20;
                
                mesh.userData = {
                    rotSpeedX: (Math.random() - 0.5) * 0.015,
                    rotSpeedY: (Math.random() - 0.5) * 0.015,
                    velocity: Math.random() * 0.02 + 0.01
                };

                scene.add(mesh);
                shapes.push(mesh);
            }

            const animate = () => {
                requestAnimationFrame(animate);

                shapes.forEach(shape => {
                    shape.rotation.x += shape.userData.rotSpeedX;
                    shape.rotation.y += shape.userData.rotSpeedY;
                    shape.position.y += shape.userData.velocity;

                    if(shape.position.y > 80) {
                        shape.position.y = -80;
                        shape.position.x = (Math.random() - 0.5) * 160;
                    }
                });

                renderer.render(scene, camera);
            };

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

 "philemon", mother: "MaNyathi", house: "house4" }, "tholakele": { id: "tholakele", name: "Tholakele", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "siduduzile": { id: "siduduzile", name: "Siduduzile", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "sithulisiwe": { id: "sithulisiwe", name: "Sithulisiwe", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "obvious": { id: "obvious", name: "Obvious", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "mkhululi": { id: "mkhululi", name: "Mkhululi", gen: 3, father: "philemon", mother: "Ma Moyo", house: "house4" }
        };

        let currentActiveDossierId = null;
        let saveTimeout;

        /* INITIALIZATION */
        window.onload = function() {
            renderFocusNode('mtalisi');
            updateDirectory();
        };

        /* TAB NAVIGATION SYSTEM */
        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('bg-ndeb-white', 'text-ndeb-black', 'shadow-[4px_4px_0px_0px_#E32636]');
                el.classList.add('bg-transparent', 'text-ndeb-white', 'border-transparent');
            });
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            
            const btn = document.getElementById(`tab-${tabId}`);
            btn.classList.add('bg-ndeb-white', 'text-ndeb-black', 'shadow-[4px_4px_0px_0px_#E32636]');
            btn.classList.remove('bg-transparent', 'text-ndeb-white', 'border-transparent');
        }

        /* 1. LINEAGE FOCUS EXPLORER */
        function renderFocusNode(memberId) {
            const canvas = document.getElementById('focus-canvas');
            const member = familyData[memberId];
            if(!member) return;

            currentActiveDossierId = memberId;

            canvas.classList.remove('fade-in');
            canvas.classList.add('fade-out');

            setTimeout(() => {
                let html = '';

                // A. PARENTS TIER
                if(member.father) {
                    const fatherObj = familyData[member.father];
                    html += `
                        <div class="flex flex-col items-center relative z-10 w-full">
                            <h3 class="text-xs font-black uppercase tracking-[0.3em] text-ndeb-white mb-6 border-b-2 border-[#333] pb-2">Izimpande <span class="text-ndeb-white/50">(Ancestral Roots)</span></h3>
                            <div class="flex gap-4 md:gap-8 justify-center relative w-full max-w-2xl conn-bracket">
                                ${fatherObj ? 
                                    createNodeCard(fatherObj.id, 'Father') : 
                                    `<div class="glass-card px-6 py-4 text-center opacity-60 border-dashed"><span class="block font-serif font-bold text-lg text-white">${member.father}</span><span class="text-xs font-bold uppercase tracking-wider text-ndeb-yellow block mt-1">Ubaba</span></div>`
                                }
                                ${member.mother ? 
                                    `<div class="glass-card px-6 py-4 text-center opacity-60 border-dashed"><span class="block font-serif font-bold text-lg text-white">${member.mother}</span><span class="text-xs font-bold uppercase tracking-wider text-ndeb-yellow block mt-1">Umama</span></div>` : ''
                                }
                                <div class="conn-line-down"></div>
                            </div>
                        </div>
                    `;
                }

                // B. FOCUS TIER (SELF + NOTES)
                html += `<div class="flex flex-col items-center relative z-20 mt-4 w-full">`;
                html += `<div class="flex flex-col md:flex-row items-center justify-center gap-6 ${member.father ? 'conn-line-up' : ''} ${member.wives ? 'conn-line-down' : ''} w-full max-w-4xl">`;
                
                const genRoman = member.gen === 1 ? 'I' : member.gen === 2 ? 'II' : 'III';
                const savedNote = localStorage.getItem(`note_${memberId}`) || '';

                html += `
                    <div class="bg-ndeb-surface border-4 border-ndeb-black shadow-[12px_12px_0px_0px_#FFD700] w-full max-w-lg overflow-hidden transform scale-105 z-30 transition-transform">
                        <div class="p-8 text-center border-b-4 border-ndeb-black relative overflow-hidden bg-[#1A1A1A]">
                            <span class="text-xs font-black uppercase tracking-[0.3em] text-ndeb-red mb-3 block relative z-10">Isizukulwane ${genRoman}</span>
                            <h2 class="font-serif text-4xl md:text-5xl font-black mb-1 text-white relative z-10 uppercase tracking-tight">${member.name}</h2>
                            ${member.id === 'mtalisi' ? `<p class="text-ndeb-white/80 text-sm font-bold font-serif mt-2 relative z-10">The Founding Patriarch</p>` : ''}
                        </div>
                        
                        <div class="bg-[#0A0A0A] p-6 relative border-t-2 border-[#333]">
                            <div class="flex justify-between items-center mb-4">
                                <label class="text-xs font-black uppercase tracking-widest text-ndeb-yellow">Amarekhodi <span class="text-[10px] text-ndeb-white/60">(Personal Ledger)</span></label>
                                <span class="text-[10px] text-ndeb-blue font-bold tracking-wider uppercase">Browser Storage</span>
                            </div>
                            
                            <textarea id="modal-note-area" oninput="saveActiveNote()" placeholder="ENTER DECEASED LOCATION, SIGNIFICANT DATES, OR MEMORIES HERE..." class="w-full h-28 bg-[#141414] border-2 border-[#333] p-4 text-sm font-serif text-ndeb-white focus:border-ndeb-blue focus:outline-none resize-none shadow-inner placeholder-ndeb-white/30 leading-relaxed uppercase tracking-wide">${savedNote}</textarea>
                            
                            <div class="flex justify-between items-center mt-3">
                                <span id="save-indicator" class="text-xs font-bold text-ndeb-green uppercase tracking-wider opacity-0 transition-opacity">Saved automatically</span>
                                <button onclick="clearActiveNote()" class="text-xs text-ndeb-red hover:text-white font-black transition-colors uppercase tracking-wider border-b-2 border-ndeb-red pb-0.5">Erase Ledger</button>
                            </div>
                        </div>
                    </div>
                `;
                html += `</div></div>`;

                // C. CHILDREN TIER (Categorized by House)
                if (member.wives && member.wives.length > 0) {
                    html += `<div class="flex flex-col items-center w-full mt-16 relative z-10">`;
                    html += `<h3 class="text-xs font-black uppercase tracking-[0.3em] text-ndeb-white mb-10 border-b-2 border-[#333] pb-2">Indlu <span class="text-ndeb-white/50">(Lineage by House)</span></h3>`;
                    html += `<div class="flex flex-col gap-10 w-full max-w-5xl">`;
                    
                    member.wives.forEach((w, wIdx) => {
                        const wifeId = `wife-${member.id}-${wIdx}`;
                        html += `
                            <div class="glass-card p-6 md:p-8">
                                <div onclick="toggleHouse('${wifeId}')" class="bg-[#0A0A0A] border-2 border-[#333] hover:border-ndeb-yellow px-6 py-4 flex items-center justify-between cursor-pointer transition-all mb-8 w-full md:w-max mx-auto group">
                                    <div class="flex items-center gap-5">
                                        <div class="w-12 h-12 bg-ndeb-blue text-white border-2 border-ndeb-black flex items-center justify-center shadow-[4px_4px_0px_0px_#E32636] group-hover:bg-ndeb-yellow group-hover:text-black group-hover:shadow-[4px_4px_0px_0px_#005BA6] transition-all">
                                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                        </div>
                                        <div class="text-left">
                                            <span class="text-[10px] uppercase tracking-widest text-ndeb-white/60 font-black block mb-1">Umama / Spouse</span>
                                            <span class="font-serif font-black text-white text-2xl uppercase tracking-tight">${w.name}</span>
                                        </div>
                                    </div>
                                    <svg id="icon-${wifeId}" class="ml-10 w-6 h-6 text-ndeb-white/60 group-hover:text-ndeb-yellow transition-transform transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>

                                <div id="${wifeId}" class="flex flex-wrap justify-center gap-5 transition-all">
                        `;
                        if(w.children.length === 0) {
                             html += `<span class="text-sm font-bold tracking-widest text-ndeb-white/40 uppercase">No descendants recorded in this ledger.</span>`;
                        } else {
                            w.children.forEach(cId => {
                                html += createNodeCard(cId, 'Child');
                            });
                        }
                        html += `</div></div>`;
                    });
                    html += `</div></div>`;
                }

                if (!member.wives && member.gen === 3) {
                    html += `
                        <div class="mt-16 text-center text-ndeb-white/40 font-bold uppercase tracking-widest text-xs border-t-2 border-[#333] pt-6 w-full max-w-md">
                            End of documented lineage for this branch.
                        </div>
                    `;
                }

                canvas.innerHTML = html;
                
                requestAnimationFrame(() => {
                    canvas.classList.remove('fade-out');
                    canvas.classList.add('fade-in');
                });
            }, 400);
        }

        function createNodeCard(id, label) {
            const m = familyData[id];
            if(!m) return '';
            return `
                <div onclick="renderFocusNode('${id}')" class="glass-card px-6 py-5 cursor-pointer text-center w-40 flex flex-col items-center justify-center group">
                    <h4 class="font-serif text-xl font-black text-white group-hover:text-ndeb-yellow transition-colors leading-tight uppercase tracking-tight">${m.name.split(' ')[0]}</h4>
                    <div class="h-0.5 w-8 bg-ndeb-blue mt-2 mb-2 group-hover:w-full transition-all duration-300"></div>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-ndeb-white/60 font-bold block">Gen ${m.gen}</span>
                </div>
            `;
        }

        function toggleHouse(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                el.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        }

        /* 2. COMPLETE REGISTRY */
        function updateDirectory() {
            const query = document.getElementById('dir-search').value.toLowerCase();
            const sort = document.getElementById('dir-sort').value;
            const grid = document.getElementById('registry-grid');
            
            let arr = Object.values(familyData).filter(m => 
                m.name.toLowerCase().includes(query) || 
                (m.mother && m.mother.toLowerCase().includes(query)) ||
                (m.father && m.father.toLowerCase().includes(query))
            );

            if(sort === 'az') arr.sort((a,b) => a.name.localeCompare(b.name));
            else arr.sort((a,b) => a.gen - b.gen);

            grid.innerHTML = '';
            if(arr.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-ndeb-white/50 font-bold uppercase tracking-widest text-sm border-2 border-dashed border-[#333]">No ancestors found matching "${query}".</div>`;
                return;
            }

            arr.forEach(m => {
                grid.innerHTML += `
                    <div onclick="renderFocusNode('${m.id}'); switchTab('explorer');" class="glass-card p-5 cursor-pointer group">
                        <div class="flex justify-between items-start mb-4 border-b-2 border-[#333] pb-3">
                            <h4 class="font-serif font-black text-xl text-white group-hover:text-ndeb-red transition-colors uppercase tracking-tight">${m.name}</h4>
                            <span class="bg-ndeb-yellow text-ndeb-black border-2 border-ndeb-black shadow-[2px_2px_0px_0px_#0A0A0A] text-[10px] font-black px-2 py-1 uppercase tracking-widest">Gen ${m.gen}</span>
                        </div>
                        <div class="text-[11px] font-bold tracking-wider text-ndeb-white/60 space-y-3 uppercase">
                            <p class="flex justify-between items-center"><span class="text-ndeb-blue">Father:</span> <span class="text-white">${m.father || 'Unknown'}</span></p>
                            <p class="flex justify-between items-center"><span class="text-ndeb-green">Mother:</span> <span class="text-white">${m.mother ? m.mother.split('(')[0] : 'Unknown'}</span></p>
                        </div>
                    </div>
                `;
            });
        }

        /* Notes Management */
        function saveActiveNote() {
            if (currentActiveDossierId) {
                const noteText = document.getElementById('modal-note-area').value;
                localStorage.setItem(`note_${currentActiveDossierId}`, noteText);
                
                // Show visual feedback
                const indicator = document.getElementById('save-indicator');
                if (indicator) {
                    clearTimeout(saveTimeout);
                    indicator.classList.remove('save-indicator');
                    indicator.style.opacity = '1';
                    
                    saveTimeout = setTimeout(() => {
                        indicator.classList.add('save-indicator');
                    }, 500);
                }
            }
        }

        function clearActiveNote() {
            if (currentActiveDossierId) {
                document.getElementById('modal-note-area').value = '';
                localStorage.removeItem(`note_${currentActiveDossierId}`);
            }
        }
    </script>
