    <style>
        body { 
            background-color: #F8F9FA; 
            color: #111111;
        }
        
        /* The uploaded Ndebele pattern used as borders */
        .pattern-border {
            height: 24px;
            background-image: url('IMG_7223.jpeg');
            background-size: cover;
            background-repeat: repeat-x;
            background-position: center;
            border-bottom: 4px solid #111111;
            border-top: 4px solid #111111;
        }

        /* Stark Geometric Cards */
        .geom-card {
            background-color: #FFFFFF;
            border: 3px solid #111111;
            box-shadow: 6px 6px 0px 0px #111111;
            transition: all 0.2s ease-in-out;
        }
        .geom-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 10px 10px 0px 0px #111111;
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #E2E4E6; border-left: 2px solid #111111; }
        ::-webkit-scrollbar-thumb { background: #111111; }
        
        /* Connecting Lines (Thick and Black like mural outlines) */
        .conn-line-down::after { 
            content: ''; position: absolute; bottom: -28px; left: 50%; width: 4px; height: 28px; 
            background-color: #111111; transform: translateX(-50%); z-index: 0;
        }
        .conn-line-up::before { 
            content: ''; position: absolute; top: -28px; left: 50%; width: 4px; height: 28px; 
            background-color: #111111; transform: translateX(-50%); z-index: 0;
        }
        .conn-bracket::before { 
            content: ''; position: absolute; top: -28px; left: 15%; right: 15%; height: 4px; 
            background-color: #111111; z-index: 0;
        }
        
        /* Animation */
        .explorer-canvas { transition: opacity 0.3s ease; }
        .fade-out { opacity: 0; }
        .fade-in { opacity: 1; }

        .warrior-watermark {
            background-image: url('a.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            opacity: 0.15;
            mix-blend-mode: multiply;

            "rose": { id: "rose", name: "Rose", gen: 3, father: "philemon", mother: "Ma Nyembezi", house: 3 }, "hopewell": { id: "hopewell", name: "Hopewell", gen: 3, father: "philemon", mother: "MaSibanda", house: 3 }, "irine": { id: "irine", name: "Irine", gen: 3, father: "philemon", mother: "MaSibanda", house: 3 }, "charm": { id: "charm", name: "Charm", gen: 3, father: "philemon", mother: "MaSibanda", house: 3 }, "thembinkosi": { id: "thembinkosi", name: "Thembinkosi", gen: 3, father: "philemon", mother: "MaSibanda", house: 3 }, "doughton": { id: "doughton", name: "Doughton", gen: 3, father: "philemon", mother: "MaSibanda", house: 3 }, "danford": { id: "danford", name: "Danford", gen: 3, father: "philemon", mother: "MaSibanda", house: 3 }, "brighton": { id: "brighton", name: "Brighton", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "simangaliphi": { id: "simangaliphi", name: "Simangaliphi", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "silindelumusa": { id: "silindelumusa", name: "Silindelumusa", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "sikhathele": { id: "sikhathele", name: "Sikhathele", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "ntombizodwa": { id: "ntombizodwa", name: "Ntombizodwa", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "xolani": { id: "xolani", name: "Xolani", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "cleopas": { id: "cleopas", name: "Cleopas", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "last": { id: "last", name: "Last", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "painford": { id: "painford", name: "Painford", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "onias": { id: "onias", name: "Onias", gen: 3, father: "philemon", mother: "MaNyathi", house: 3 }, "bowen": { id: "bowen", name: "Bowen", gen: 3, father: "philemon", mother: "MaNyathi", house: 3 }, "tholakele": { id: "tholakele", name: "Tholakele", gen: 3, father: "philemon", mother: "MaNyathi", house: 3 }, "siduduzile": { id: "siduduzile", name: "Siduduzile", gen: 3, father: "philemon", mother: "MaNyathi", house: 3 }, "sithulisiwe": { id: "sithulisiwe", name: "Sithulisiwe", gen: 3, father: "philemon", mother: "MaNyathi", house: 3 }, "obvious": { id: "obvious", name: "Obvious", gen: 3, father: "philemon", mother: "MaNyathi", house: 3 }, "mkhululi": { id: "mkhululi", name: "Mkhululi", gen: 3, father: "philemon", mother: "Ma Moyo", house: 3 }
        };

        let currentActiveDossierId = null;
        let saveTimeout;

        /* INITIALIZATION */
        window.onload = function() {
            renderFocusNode('mtalisi');
            updateDirectory();
        };

        /* TAB NAVIGATION SYSTEM */
        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('bg-nd-black', 'text-white');
                el.classList.add('bg-nd-white', 'text-nd-black');
            });
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            const btn = document.getElementById(`tab-${tabId}`);
            btn.classList.add('bg-nd-black', 'text-white');
            btn.classList.remove('bg-nd-white', 'text-nd-black');
        }

        /* 1. LINEAGE FOCUS EXPLORER */
        function renderFocusNode(memberId) {
            const canvas = document.getElementById('focus-canvas');
            const member = familyData[memberId];
            if(!member) return;

            currentActiveDossierId = memberId;

            canvas.classList.remove('fade-in');
            canvas.classList.add('fade-out');

            setTimeout(() => {
                let html = '';
                const hColor = member.house !== undefined && member.house !== "all" ? houseColors[member.house] : 'bg-nd-black';
                const tColor = member.house !== undefined && member.house !== "all" ? textColors[member.house] : 'text-white';

                // A. PARENTS TIER
                if(member.father) {
                    const fatherObj = familyData[member.father];
                    html += `
                        <div class="flex flex-col items-center relative z-10 w-full">
                            <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-nd-black mb-6 border-b-4 border-nd-black pb-1">Izimpande <span class="text-nd-black/60 font-sans tracking-normal">(Roots)</span></h3>
                            <div class="flex gap-6 md:gap-12 justify-center relative w-full max-w-2xl conn-bracket">
                                ${fatherObj ? 
                                    createNodeCard(fatherObj.id, 'Father') : 
                                    `<div class="geom-card px-8 py-5 text-center opacity-70"><span class="block font-display font-bold text-xl text-nd-black uppercase">${member.father}</span><span class="text-[10px] font-bold uppercase tracking-widest text-nd-black/60 block mt-1">Ubaba (Father)</span></div>`
                                }
                                ${member.mother ? 
                                    `<div class="geom-card px-8 py-5 text-center opacity-70"><span class="block font-display font-bold text-xl text-nd-black uppercase">${member.mother}</span><span class="text-[10px] font-bold uppercase tracking-widest text-nd-black/60 block mt-1">Umama (Mother)</span></div>` : ''
                                }
                                <div class="conn-line-down"></div>
                            </div>
                        </div>
                    `;
                }

                // B. FOCUS TIER (SELF + NOTES)
                html += `<div class="flex flex-col items-center relative z-20 mt-4 w-full">`;
                html += `<div class="flex flex-col md:flex-row items-center justify-center gap-6 ${member.father ? 'conn-line-up' : ''} ${member.wives ? 'conn-line-down' : ''} w-full max-w-4xl">`;
                
                const genRoman = member.gen === 1 ? 'I' : member.gen === 2 ? 'II' : 'III';
                const savedNote = localStorage.getItem(`note_${memberId}`) || '';

                html += `
                    <div class="geom-card w-full max-w-lg overflow-hidden transform scale-105 z-30 border-4 relative">
                        <div class="p-8 text-center border-b-4 border-nd-black relative ${hColor}">
                            <span class="text-[10px] font-bold uppercase tracking-[0.3em] ${tColor} mb-2 block relative z-10">Isizukulwane ${genRoman}</span>
                            <h2 class="font-display text-4xl md:text-5xl font-bold mb-1 ${tColor} uppercase relative z-10">${member.name}</h2>
                            ${member.id === 'mtalisi' ? `<p class="text-white text-xs font-bold uppercase tracking-widest mt-2 relative z-10 bg-nd-black inline-block px-3 py-1">The Founding Patriarch</p>` : ''}
                        </div>
                        
                        <!-- NDEBELE WARRIOR WATERMARK -->
                        <div class="bg-nd-gray p-6 relative min-h-[160px] warrior-watermark">
                            <div class="flex justify-between items-center mb-3 relative z-10">
                                <label class="text-xs font-bold uppercase tracking-widest text-nd-black">Amarekhodi <span class="text-[10px] normal-case tracking-normal">(Personal Ledger)</span></label>
                                <span class="text-[10px] text-nd-black/60 font-bold uppercase bg-nd-white px-2 py-0.5 border-2 border-nd-black">Browser Storage</span>
                            </div>
                            
                            <textarea id="modal-note-area" oninput="saveActiveNote()" placeholder="Enter deceased location, dates, or memories..." class="w-full h-24 bg-nd-white border-3 border-nd-black font-bold p-3 text-sm text-nd-black focus:outline-none resize-none shadow-solid-sm placeholder-nd-black/40 relative z-10 uppercase transition-all focus:bg-nd-yellow">${savedNote}</textarea>
                            
                            <div class="flex justify-between items-center mt-3 relative z-10">
                                <span id="save-indicator" class="text-[10px] text-nd-green font-bold uppercase opacity-0 transition-opacity bg-white px-2 border-2 border-nd-green">Saved automatically</span>
                                <button onclick="clearActiveNote()" class="text-[10px] text-nd-red bg-white border-2 border-nd-red hover:bg-nd-red hover:text-white px-3 py-1 font-bold transition-colors uppercase tracking-wider shadow-solid-sm hover:shadow-none hover:translate-y-0.5">Erase Ledger</button>
                            </div>
                        </div>
                    </div>
                `;
                html += `</div></div>`;

                // C. CHILDREN TIER (Categorized by House)
                if (member.wives && member.wives.length > 0) {
                    html += `<div class="flex flex-col items-center w-full mt-16 relative z-10">`;
                    html += `<h3 class="text-xs font-bold uppercase tracking-[0.2em] text-nd-black mb-8 border-b-4 border-nd-black pb-1">Indlu <span class="text-nd-black/60 font-sans tracking-normal">(Lineage by House)</span></h3>`;
                    html += `<div class="flex flex-col gap-10 w-full max-w-5xl">`;
                    
                    member.wives.forEach((w, wIdx) => {
                        const wifeId = `wife-${member.id}-${wIdx}`;
                        // We use the index to assign one of the 4 Ndebele colors to the house block
                        const blockColor = houseColors[wIdx % 4];
                        const textColor = textColors[wIdx % 4];
                        
                        html += `
                            <div class="geom-card p-6 md:p-8 bg-nd-white border-4">
                                <div onclick="toggleHouse('${wifeId}')" class="${blockColor} border-4 border-nd-black px-6 py-4 flex items-center justify-between cursor-pointer transition-all mb-8 w-full md:w-max mx-auto group shadow-solid">
                                    <div class="flex items-center gap-4">
                                        <div class="text-left">
                                            <span class="text-[10px] uppercase tracking-widest ${textColor} font-bold block mb-0.5 opacity-80">Umama (Mother)</span>
                                            <span class="font-display font-bold ${textColor} uppercase text-2xl tracking-wide">${w.name}</span>
                                        </div>
                                    </div>
                                    <svg id="icon-${wifeId}" class="ml-8 w-6 h-6 ${textColor} transition-transform transform rotate-180" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" d="M19 9l-7 7-7-7"></path></svg>
                                </div>

                                <div id="${wifeId}" class="flex flex-wrap justify-center gap-4 md:gap-6 transition-all">
                        `;
                        if(w.children.length === 0) {
                             html += `<span class="text-sm font-bold uppercase text-nd-black/60 bg-nd-gray px-4 py-2 border-2 border-nd-black">No descendants recorded</span>`;
                        } else {
                            w.children.forEach(cId => {
                                html += createNodeCard(cId, 'Child');
                            });
                        }
                        html += `</div></div>`;
                    });
                    html += `</div></div>`;
                }

                if (!member.wives && member.gen === 3) {
                    html += `
                        <div class="mt-12 text-center text-nd-black/60 font-bold uppercase tracking-widest bg-nd-gray px-6 py-2 border-4 border-nd-black shadow-solid-sm">
                            End of documented lineage for this branch.
                        </div>
                    `;
                }

                canvas.innerHTML = html;
                
                requestAnimationFrame(() => {
                    canvas.classList.remove('fade-out');
                    canvas.classList.add('fade-in');
                });
            }, 300);
        }

        function createNodeCard(id) {
            const m = familyData[id];
            if(!m) return '';
            const cColor = m.house !== undefined && m.house !== "all" ? houseColors[m.house] : 'bg-nd-black';
            return `
                <div onclick="renderFocusNode('${id}')" class="geom-card px-6 py-5 cursor-pointer text-center w-36 md:w-44 flex flex-col items-center justify-center group relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 ${cColor} border-b-3 border-nd-black"></div>
                    <h4 class="font-display text-xl font-bold text-nd-black group-hover:text-nd-blue uppercase transition-colors leading-tight mt-1">${m.name.split(' ')[0]}</h4>
                    <span class="text-[10px] uppercase tracking-widest text-nd-black/60 mt-2 font-bold block">Gen ${m.gen}</span>
                </div>
            `;
        }

        function toggleHouse(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                el.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        }

        /* 2. COMPLETE REGISTRY */
        function updateDirectory() {
            const query = document.getElementById('dir-search').value.toLowerCase();
            const sort = document.getElementById('dir-sort').value;
            const grid = document.getElementById('registry-grid');
            
            let arr = Object.values(familyData).filter(m => 
                m.name.toLowerCase().includes(query) || 
                (m.mother && m.mother.toLowerCase().includes(query)) ||
                (m.father && m.father.toLowerCase().includes(query))
            );

            if(sort === 'az') arr.sort((a,b) => a.name.localeCompare(b.name));
            else arr.sort((a,b) => a.gen - b.gen);

            grid.innerHTML = '';
            if(arr.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-nd-black/60 font-bold uppercase">No ancestors found matching "${query}".</div>`;
                return;
            }

            arr.forEach(m => {
                const cColor = m.house !== undefined && m.house !== "all" ? houseColors[m.house] : 'bg-nd-black';
                grid.innerHTML += `
                    <div onclick="renderFocusNode('${m.id}'); switchTab('explorer');" class="geom-card p-5 cursor-pointer group relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 ${cColor} border-b-3 border-nd-black"></div>
                        <div class="flex justify-between items-start mb-3 border-b-2 border-nd-black pb-3 mt-1">
                            <h4 class="font-display font-bold text-xl text-nd-black group-hover:text-nd-blue uppercase transition-colors">${m.name}</h4>
                            <span class="bg-nd-black text-nd-white text-[10px] font-bold px-2 py-0.5 border-2 border-nd-black uppercase tracking-widest shadow-solid-sm">Gen ${m.gen}</span>
                        </div>
                        <div class="text-xs text-nd-black font-bold uppercase space-y-1.5 opacity-80">
                            <p class="flex justify-between"><span>Ubaba:</span> <span>${m.father || 'Unknown'}</span></p>
                            <p class="flex justify-between"><span>Umama:</span> <span>${m.mother ? m.mother.split('(')[0] : 'Unknown'}</span></p>
                        </div>
                    </div>
                `;
            });
        }

        /* Notes Management */
        function saveActiveNote() {
            if (currentActiveDossierId) {
                const noteText = document.getElementById('modal-note-area').value;
                localStorage.setItem(`note_${currentActiveDossierId}`, noteText);
                
                const indicator = document.getElementById('save-indicator');
                if (indicator) {
                    clearTimeout(window.saveTimeout);
                    indicator.classList.remove('save-indicator');
                    indicator.style.opacity = '1';
                    
                    window.saveTimeout = setTimeout(() => {
                        indicator.classList.add('save-indicator');
                    }, 500);
                }
            }
        }

        function clearActiveNote() {
            if (currentActiveDossierId) {
                document.getElementById('modal-note-area').value = '';
                localStorage.removeItem(`note_${currentActiveDossierId}`);
            }
        }
    </script>
</body>
</html>
