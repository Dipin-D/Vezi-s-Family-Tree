        body {

        /* Sleek Modern Glassmorphism */
        .glass-panel {
            background: rgba(20, 20, 24, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(212, 175, 55, 0.3); /* Subtle Gold border on hover */
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.15);

        /* Minimalist Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* Canvas Animations */

        .fade-out { opacity: 0; transform: scale(0.98); }
        .fade-in { opacity: 1; transform: scale(1); }

        /* Sleek Connector Lines */
        .conn-line-down::after { 
            content: ''; position: absolute; bottom: -28px; left: 50%; width: 1px; height: 28px; 
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2), transparent); 
            transform: translateX(-50%); 
        }
        .conn-line-up::before { 
            content: ''; position: absolute; top: -28px; left: 50%; width: 1px; height: 28px; 
            background: linear-gradient(to top, rgba(255, 255, 255, 0.2), transparent); 
            transform: translateX(-50%); 
        }
        .conn-bracket::before { 
            content: ''; position: absolute; top: -28px; left: 15%; right: 15%; height: 1px; 
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent); 
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        .save-indicator { animation: fadeOut 2s forwards; }

    <script>
        /* --- THREE.JS BACKGROUND ANIMATION: SLEEK ATMOSPHERE --- */
        const initBackground = () => {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            const particlesCount = 300;
            const posArray = new Float32Array(particlesCount * 3);

            for(let i = 0; i < particlesCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 150;   
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const material = new THREE.PointsMaterial({
                size: 1,
                color: 0xffffff,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending
            });

            const particlesMesh = new THREE.Points(geometry, material);
            scene.add(particlesMesh);

            let time = 0;

            const animate = () => {
                requestAnimationFrame(animate);
                time += 0.001;
                
                particlesMesh.rotation.y = time * 0.5;
                particlesMesh.rotation.x = time * 0.2;

                renderer.render(scene, camera);
            };

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

        let currentActiveDossierId = null;
        let saveTimeout;

        /* INITIALIZATION */
        window.onload = function() {

        /* TAB NAVIGATION SYSTEM */
        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('bg-white/10', 'text-white', 'border-white/10');
                el.classList.add('text-gray-400', 'border-transparent');
            });
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            const btn = document.getElementById(`tab-${tabId}`);
            btn.classList.add('bg-white/10', 'text-white', 'border-white/10');
            btn.classList.remove('text-gray-400', 'border-transparent');
        }

        /* 1. LINEAGE FOCUS EXPLORER */
        function renderFocusNode(memberId) {
            const canvas = document.getElementById('focus-canvas');
            const member = familyData[memberId];
            if(!member) return;

            currentActiveDossierId = memberId;

            canvas.classList.remove('fade-in');
            canvas.classList.add('fade-out');

            setTimeout(() => {
                let html = '';

                // A. PARENTS TIER
                if(member.father) {
                    const fatherObj = familyData[member.father];
                    html += `
                        <div class="flex flex-col items-center relative z-10 w-full">
                            <h3 class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500 mb-6 border-b border-white/10 pb-2">Izimpande <span class="text-gray-600">(Ancestral Roots)</span></h3>
                            <div class="flex gap-4 md:gap-8 justify-center relative w-full max-w-2xl conn-bracket">
                                ${fatherObj ? 
                                    createNodeCard(fatherObj.id, 'Father') : 
                                    `<div class="glass-card rounded-2xl px-6 py-4 text-center opacity-60 border-dashed border-white/10"><span class="block font-serif text-lg text-white">${member.father}</span><span class="text-xs uppercase tracking-wider text-gray-400 block mt-1">Ubaba</span></div>`
                                }
                                ${member.mother ? 
                                    `<div class="glass-card rounded-2xl px-6 py-4 text-center opacity-60 border-dashed border-white/10"><span class="block font-serif text-lg text-white">${member.mother}</span><span class="text-xs uppercase tracking-wider text-gray-400 block mt-1">Umama</span></div>` : ''
                                }
                                <div class="conn-line-down"></div>
                            </div>
                        </div>
                    `;
                }

                html += `<div class="flex flex-col items-center relative z-20 mt-4 w-full">`;
                html += `<div class="flex flex-col md:flex-row items-center justify-center gap-6 ${member.father ? 'conn-line-up' : ''} ${member.wives ? 'conn-line-down' : ''} w-full max-w-4xl">`;
                
                const genRoman = member.gen === 1 ? 'I' : member.gen === 2 ? 'II' : 'III';
                const savedNote = localStorage.getItem(`note_${memberId}`) || '';

                html += `
                    <div class="bg-[#111111] border border-white/10 rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden transform scale-105 z-30">
                        <div class="p-8 text-center border-b border-white/5 relative overflow-hidden">
                            <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/5 rounded-full blur-3xl"></div>
                            <span class="text-[10px] font-medium uppercase tracking-[0.3em] text-gray-400 mb-2 block relative z-10">Isizukulwane ${genRoman}</span>
                            <h2 class="font-serif text-3xl md:text-4xl font-light mb-1 text-white relative z-10">${member.name}</h2>
                            ${member.id === 'mtalisi' ? `<p class="text-brand-gold/60 text-xs italic font-serif mt-2 relative z-10">The Founding Patriarch</p>` : ''}
                        </div>
                        
                        <div class="bg-black/20 p-6 relative">
                            <div class="flex justify-between items-center mb-3">
                                <label class="text-xs font-medium uppercase tracking-widest text-gray-300">Amarekhodi <span class="text-[10px] text-gray-500 normal-case">(Personal Ledger)</span></label>
                                <span class="text-[10px] text-gray-600 italic font-serif">Browser Storage</span>
                            </div>
                            
                            <textarea id="modal-note-area" oninput="saveActiveNote()" placeholder="Enter deceased location, significant dates, or memories here..." class="w-full h-28 bg-white/5 border border-white/5 rounded-xl p-4 text-sm font-serif text-gray-300 focus:ring-1 focus:ring-brand-gold/50 focus:border-brand-gold/50 focus:outline-none resize-none shadow-inner placeholder-gray-600 leading-relaxed">${savedNote}</textarea>
                            
                            <div class="flex justify-between items-center mt-2">
                                <span id="save-indicator" class="text-[10px] text-green-400 italic opacity-0 transition-opacity">Saved automatically</span>
                                <button onclick="clearActiveNote()" class="text-[10px] text-gray-500 hover:text-red-400 font-medium transition-colors uppercase tracking-wider">Erase Ledger</button>
                            </div>
                        </div>
                    </div>
                `;
                html += `</div></div>`;

                // C. CHILDREN TIER (Categorized by House)
                if (member.wives && member.wives.length > 0) {
                    html += `<div class="flex flex-col items-center w-full mt-16 relative z-10">`;
                    html += `<h3 class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500 mb-8 border-b border-white/10 pb-2">Indlu <span class="text-gray-600">(Lineage by House)</span></h3>`;
                    html += `<div class="flex flex-col gap-8 w-full max-w-5xl">`;
                    
                    member.wives.forEach((w, wIdx) => {
                        const wifeId = `wife-${member.id}-${wIdx}`;
                        html += `
                            <div class="glass-card rounded-[2rem] p-6 md:p-8">
                                <div onclick="toggleHouse('${wifeId}')" class="bg-white/5 border border-white/10 hover:bg-white/10 rounded-2xl px-6 py-4 flex items-center justify-between cursor-pointer transition-all mb-8 w-full md:w-max mx-auto group">
                                    <div class="flex items-center gap-4">
                                        <div class="w-10 h-10 rounded-full bg-black/50 text-gray-300 border border-white/10 flex items-center justify-center text-lg shadow-inner group-hover:scale-110 group-hover:bg-brand-gold/20 group-hover:text-brand-gold transition-all">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                        </div>
                                        <div class="text-left">
                                            <span class="text-[10px] uppercase tracking-widest text-gray-500 font-medium block mb-0.5">Umama / Spouse</span>
                                            <span class="font-serif font-light text-white text-xl">${w.name}</span>
                                        </div>
                                    </div>
                                    <svg id="icon-${wifeId}" class="ml-8 w-5 h-5 text-gray-500 group-hover:text-white transition-transform transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 9l-7 7-7-7"></path></svg>
                                </div>

                                <div id="${wifeId}" class="flex flex-wrap justify-center gap-4 transition-all">
                        `;
                        if(w.children.length === 0) {
                             html += `<span class="text-sm text-gray-500 italic font-serif">No descendants recorded in this ledger.</span>`;
                        } else {
                            w.children.forEach(cId => {
                                html += createNodeCard(cId, 'Child');
                            });
                        }
                        html += `</div></div>`;
                    });
                    html += `</div></div>`;
                }

                if (!member.wives && member.gen === 3) {
                    html += `
                        <div class="mt-12 text-center text-gray-600 italic text-sm font-serif">
                            End of documented lineage for this branch.
                        </div>
                    `;
                }

                canvas.innerHTML = html;
                
                requestAnimationFrame(() => {
                    canvas.classList.remove('fade-out');
                    canvas.classList.add('fade-in');
                });
            }, 400);
        }

        function createNodeCard(id, label) {
            const m = familyData[id];
            if(!m) return '';
            return `
                <div onclick="renderFocusNode('${id}')" class="glass-card px-6 py-4 cursor-pointer text-center w-36 md:w-44 flex flex-col items-center justify-center group rounded-2xl">
                    <h4 class="font-serif text-lg font-light text-white group-hover:text-brand-gold transition-colors leading-tight">${m.name.split(' ')[0]}</h4>
                    <span class="text-[9px] uppercase tracking-widest text-gray-500 mt-2 font-medium block">Gen ${m.gen}</span>
                </div>
            `;
        }

        function toggleHouse(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                el.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        }

        /* 2. COMPLETE REGISTRY */
        function updateDirectory() {
            const query = document.getElementById('dir-search').value.toLowerCase();
            const sort = document.getElementById('dir-sort').value;
            const grid = document.getElementById('registry-grid');
            
            let arr = Object.values(familyData).filter(m => 
                m.name.toLowerCase().includes(query) || 
                (m.mother && m.mother.toLowerCase().includes(query)) ||
                (m.father && m.father.toLowerCase().includes(query))
            );

            if(sort === 'az') arr.sort((a,b) => a.name.localeCompare(b.name));
            else arr.sort((a,b) => a.gen - b.gen);

            grid.innerHTML = '';
            if(arr.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-gray-500 font-serif italic">No ancestors found matching "${query}".</div>`;
                return;
            }

            arr.forEach(m => {
                grid.innerHTML += `
                    <div onclick="renderFocusNode('${m.id}'); switchTab('explorer');" class="glass-card rounded-2xl p-5 cursor-pointer group">
                        <div class="flex justify-between items-start mb-3 border-b border-white/5 pb-3">
                            <h4 class="font-serif font-light text-lg text-white group-hover:text-brand-gold transition-colors">${m.name}</h4>
                            <span class="bg-white/5 text-gray-300 border border-white/10 text-[9px] font-medium px-2 py-0.5 rounded-full uppercase tracking-widest">Gen ${m.gen}</span>
                        </div>
                        <div class="text-xs text-gray-400 space-y-2">
                            <p class="flex justify-between"><span>Father:</span> <span class="text-gray-200 font-medium">${m.father || 'Unknown'}</span></p>
                            <p class="flex justify-between"><span>Mother:</span> <span class="text-gray-200 font-medium">${m.mother ? m.mother.split('(')[0] : 'Unknown'}</span></p>
                        </div>
                    </div>
                `;
            });
        }

        /* Notes Management */
        function saveActiveNote() {
            if (currentActiveDossierId) {
                const noteText = document.getElementById('modal-note-area').value;
                localStorage.setItem(`note_${currentActiveDossierId}`, noteText);
                
                // Show visual feedback
                const indicator = document.getElementById('save-indicator');
                if (indicator) {
                    clearTimeout(saveTimeout);
                    indicator.classList.remove('save-indicator');
                    indicator.style.opacity = '1';
                    
                    saveTimeout = setTimeout(() => {
                        indicator.classList.add('save-indicator');
                    }, 500);
                }
            }
        }

        function clearActiveNote() {
            if (currentActiveDossierId) {
                document.getElementById('modal-note-area').value = '';
                localStorage.removeItem(`note_${currentActiveDossierId}`);
            }
        }
    </script>
