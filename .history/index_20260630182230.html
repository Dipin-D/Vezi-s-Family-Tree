    <script>
        /* --- THREE.JS BACKGROUND ANIMATION: ETHEREAL EMBERS --- */
        const initBackground = () => {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Particle Setup (Embers)
            const particlesCount = 150; // Fewer, larger particles for a calmer feel
            const posArray = new Float32Array(particlesCount * 3);
            const velocityArray = [];
            const offsetArray = []; // For sine wave floating

            for(let i = 0; i < particlesCount * 3; i+=3) {
                posArray[i] = (Math.random() - 0.5) * 150;   // x
                posArray[i+1] = (Math.random() - 0.5) * 150; // y
                posArray[i+2] = (Math.random() - 0.5) * 80;  // z
                
                velocityArray.push({
                    y: Math.random() * 0.03 + 0.01 // Slow upward drift
                });
                offsetArray.push({
                    speed: Math.random() * 0.02 + 0.01,
                    amp: Math.random() * 0.05
                });
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            // Create a soft glowing amber material
            const material = new THREE.PointsMaterial({
                size: 1.5,
                color: 0xf59e0b, // Amber-500
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            const particlesMesh = new THREE.Points(geometry, material);
            scene.add(particlesMesh);

            let time = 0;

            // Animation Loop
            const animate = () => {
                requestAnimationFrame(animate);
                time += 0.1;

                const positions = particlesMesh.geometry.attributes.position.array;

                for(let i = 0; i < particlesCount; i++) {
                    const i3 = i * 3;
                    
                    // Upward drift
                    positions[i3+1] += velocityArray[i].y;
                    
                    // Gentle sine wave wobble on X and Z
                    positions[i3] += Math.sin(time * offsetArray[i].speed) * offsetArray[i].amp;
                    positions[i3+2] += Math.cos(time * offsetArray[i].speed) * offsetArray[i].amp;

                    // Wrap around bottom if they float too high
                    if(positions[i3+1] > 75) {
                        positions[i3+1] = -75;
                        positions[i3] = (Math.random() - 0.5) * 150;
                    }
                }
                
                particlesMesh.geometry.attributes.position.needsUpdate = true;
                
                // Very slow scene rotation
                scene.rotation.y += 0.0005;

                renderer.render(scene, camera);
            };

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };

            "zale": { id: "zale", name: "Zale", gen: 3, father: "ganda", mother: "Ma Dube", house: "house3" }, "rebecca": { id: "rebecca", name: "Rebecca", gen: 3, father: "ganda", mother: "Ma Dube", house: "house3" }, "thiwe": { id: "thiwe", name: "Thiwe", gen: 3, father: "ganda", mother: "Ma Dube", house: "house3" }, "sibongile": { id: "sibongile", name: "Sibongile", gen: 3, father: "ganda", mother: "Ma Dube", house: "house3" }, "melodisi": { id: "melodisi", name: "Melodisi", gen: 3, father: "ganda", mother: "Ma Dube", house: "house3" }, "zenzo": { id: "zenzo", name: "Zenzo", gen: 3, father: "ganda", mother: "Magagula", house: "house3" }, "aupa": { id: "aupa", name: "Aupa", gen: 3, father: "ganda", mother: "Magagula", house: "house3" }, "dumisani": { id: "dumisani", name: "Dumisani", gen: 3, father: "ganda", mother: "Magagula", house: "house3" }, "sibangani": { id: "sibangani", name: "Sibangani", gen: 3, father: "ganda", mother: "Magagula", house: "house3" }, "thefiya": { id: "thefiya", name: "Thefiya", gen: 3, father: "ganda", mother: "Magagula", house: "house3" }, "ngqala": { id: "ngqala", name: "Ngqala", gen: 3, father: "ganda", mother: "Magagula", house: "house3" },
            "gladmore": { id: "gladmore", name: "Gladmore", gen: 3, father: "nani", mother: "Ma Mpofu", house: "house3" }, "gladys": { id: "gladys", name: "Gladys", gen: 3, father: "nani", mother: "Ma Mpofu", house: "house3" }, "gladwin": { id: "gladwin", name: "Gladwin", gen: 3, father: "nani", mother: "Ma Mpofu", house: "house3" }, "garnet": { id: "garnet", name: "Garnet", gen: 3, father: "nani", mother: "Ma Mpofu", house: "house3" }, "gardener": { id: "gardener", name: "Gardener", gen: 3, father: "nani", mother: "Ma Mpofu", house: "house3" },
            "rose": { id: "rose", name: "Rose", gen: 3, father: "philemon", mother: "Ma Nyembezi", house: "house4" }, "hopewell": { id: "hopewell", name: "Hopewell", gen: 3, father: "philemon", mother: "MaSibanda", house: "house4" }, "irine": { id: "irine", name: "Irine", gen: 3, father: "philemon", mother: "MaSibanda", house: "house4" }, "charm": { id: "charm", name: "Charm", gen: 3, father: "philemon", mother: "MaSibanda", house: "house4" }, "thembinkosi": { id: "thembinkosi", name: "Thembinkosi", gen: 3, father: "philemon", mother: "MaSibanda", house: "house4" }, "doughton": { id: "doughton", name: "Doughton", gen: 3, father: "philemon", mother: "MaSibanda", house: "house4" }, "danford": { id: "danford", name: "Danford", gen: 3, father: "philemon", mother: "MaSibanda", house: "house4" }, "brighton": { id: "brighton", name: "Brighton", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "simangaliphi": { id: "simangaliphi", name: "Simangaliphi", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "silindelumusa": { id: "silindelumusa", name: "Silindelumusa", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "sikhathele": { id: "sikhathele", name: "Sikhathele", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "ntombizodwa": { id: "ntombizodwa", name: "Ntombizodwa", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "xolani": { id: "xolani", name: "Xolani", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "cleopas": { id: "cleopas", name: "Cleopas", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "last": { id: "last", name: "Last", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "painford": { id: "painford", name: "Painford", gen: 3, father: "philemon", mother: "MaDube", house: "house4" }, "onias": { id: "onias", name: "Onias", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "bowen": { id: "bowen", name: "Bowen", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "tholakele": { id: "tholakele", name: "Tholakele", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "siduduzile": { id: "siduduzile", name: "Siduduzile", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "sithulisiwe": { id: "sithulisiwe", name: "Sithulisiwe", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "obvious": { id: "obvious", name: "Obvious", gen: 3, father: "philemon", mother: "MaNyathi", house: "house4" }, "mkhululi": { id: "mkhululi", name: "Mkhululi", gen: 3, father: "philemon", mother: "Ma Moyo", house: "house4" }
        };

        let currentActiveDossierId = null;

        /* INITIALIZATION */
        window.onload = function() {
            renderFocusNode('mtalisi');
            updateDirectory();
        };

        /* TAB NAVIGATION SYSTEM */
        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('bg-ember-600', 'text-white', 'border-ember-400/50', 'shadow-[0_0_15px_rgba(245,158,11,0.3)]', 'hover:bg-ember-500');
                el.classList.add('text-ember-200', 'border-transparent');
            });
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            const btn = document.getElementById(`tab-${tabId}`);
            btn.classList.add('bg-ember-600', 'text-white', 'border-ember-400/50', 'shadow-[0_0_15px_rgba(245,158,11,0.3)]', 'hover:bg-ember-500');
            btn.classList.remove('text-ember-200', 'border-transparent');
        }

        /* 1. LINEAGE FOCUS EXPLORER */
        function renderFocusNode(memberId) {
            const canvas = document.getElementById('focus-canvas');
            const member = familyData[memberId];
            if(!member) return;

            currentActiveDossierId = memberId;

            canvas.classList.remove('fade-in');
            canvas.classList.add('fade-out');

            setTimeout(() => {
                let html = '';

                // A. PARENTS TIER
                if(member.father) {
                    const fatherObj = familyData[member.father];
                    html += `
                        <div class="flex flex-col items-center relative z-10 w-full">
                            <h3 class="text-[10px] font-bold uppercase tracking-[0.3em] text-ember-500/80 mb-6 border-b border-ember-500/20 pb-2">Ancestral Roots</h3>
                            <div class="flex gap-4 md:gap-8 justify-center relative w-full max-w-2xl conn-bracket">
                                ${fatherObj ? 
                                    createNodeCard(fatherObj.id, 'Father') : 
                                    `<div class="glass-card rounded-2xl px-6 py-4 text-center opacity-60 border-dashed border-ember-500/30"><span class="block font-serif text-lg text-white">${member.father}</span></div>`
                                }
                                ${member.mother ? 
                                    `<div class="glass-card rounded-2xl px-6 py-4 text-center opacity-60 border-dashed border-ember-500/30"><span class="block font-serif text-lg text-white">${member.mother}</span></div>` : ''
                                }
                                <div class="conn-line-down"></div>
                            </div>
                        </div>
                    `;
                }

                // B. FOCUS TIER (SELF + NOTES)
                html += `<div class="flex flex-col items-center relative z-20 mt-4 w-full">`;
                html += `<div class="flex flex-col md:flex-row items-center justify-center gap-6 ${member.father ? 'conn-line-up' : ''} ${member.wives ? 'conn-line-down' : ''} w-full max-w-4xl">`;
                
                const genRoman = member.gen === 1 ? 'I' : member.gen === 2 ? 'II' : 'III';
                const savedNote = localStorage.getItem(`note_${memberId}`) || '';

                html += `
                    <div class="bg-gradient-to-b from-hearth-800 to-hearth-950 border border-ember-500/20 rounded-[2rem] shadow-[0_0_50px_rgba(245,158,11,0.15)] w-full max-w-lg overflow-hidden transform scale-105 z-30">
                        <div class="p-8 text-center border-b border-ember-500/10 relative overflow-hidden">
                            <div class="absolute -top-10 -right-10 w-40 h-40 bg-ember-500/10 rounded-full blur-3xl"></div>
                            <span class="text-[10px] font-bold uppercase tracking-[0.3em] text-ember-400 mb-2 block relative z-10">Generation ${genRoman}</span>
                            <h2 class="font-serif text-3xl md:text-4xl font-bold mb-1 text-white relative z-10">${member.name}</h2>
                            ${member.id === 'mtalisi' ? `<p class="text-ember-300/60 text-xs italic font-serif mt-2 relative z-10">The Founding Patriarch</p>` : ''}
                        </div>
                        
                        <div class="bg-black/20 p-6">
                            <div class="flex justify-between items-center mb-3">
                                <label class="text-xs font-bold uppercase tracking-widest text-ember-300">Personal Ledger</label>
                                <span class="text-[10px] text-ember-500/60 italic font-serif">Browser Storage</span>
                            </div>
                            <textarea id="modal-note-area" oninput="saveActiveNote()" placeholder="Enter deceased location, significant dates, or memories here..." class="w-full h-28 bg-black/40 border border-ember-500/20 rounded-xl p-4 text-sm font-serif text-ember-100 focus:ring-1 focus:ring-ember-500 focus:border-ember-500 focus:outline-none resize-none shadow-inner placeholder-ember-500/30 leading-relaxed">${savedNote}</textarea>
                            <div class="flex justify-end mt-2">
                                <button onclick="clearActiveNote()" class="text-[10px] text-ember-600 hover:text-red-400 font-bold transition-colors uppercase tracking-wider">Erase Ledger</button>
                            </div>
                        </div>
                    </div>
                `;
                html += `</div></div>`;

                // C. CHILDREN TIER (Categorized by House)
                if (member.wives && member.wives.length > 0) {
                    html += `<div class="flex flex-col items-center w-full mt-16 relative z-10">`;
                    html += `<h3 class="text-[10px] font-bold uppercase tracking-[0.3em] text-ember-500/80 mb-8 border-b border-ember-500/20 pb-2">Lineage by House</h3>`;
                    html += `<div class="flex flex-col gap-8 w-full max-w-5xl">`;
                    
                    member.wives.forEach((w, wIdx) => {
                        const wifeId = `wife-${member.id}-${wIdx}`;
                        html += `
                            <div class="glass-card rounded-[2rem] p-6 md:p-8">
                                <div onclick="toggleHouse('${wifeId}')" class="bg-white/5 border border-ember-500/20 hover:border-ember-400/60 hover:bg-white/10 rounded-2xl px-6 py-4 flex items-center justify-between cursor-pointer transition-all mb-8 w-full md:w-max mx-auto group">
                                    <div class="flex items-center gap-4">
                                        <div class="w-10 h-10 rounded-full bg-hearth-900 text-ember-400 border border-ember-500/20 flex items-center justify-center text-lg shadow-inner group-hover:scale-110 group-hover:bg-ember-500 group-hover:text-white transition-all">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                        </div>
                                        <div class="text-left">
                                            <span class="text-[10px] uppercase tracking-widest text-ember-500/80 font-bold block mb-0.5">Mother / Spouse</span>
                                            <span class="font-serif font-bold text-white text-xl">${w.name}</span>
                                        </div>
                                    </div>
                                    <svg id="icon-${wifeId}" class="ml-8 w-5 h-5 text-ember-500/60 group-hover:text-ember-400 transition-transform transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>

                                <div id="${wifeId}" class="flex flex-wrap justify-center gap-4 transition-all">
                        `;
                        if(w.children.length === 0) {
                             html += `<span class="text-sm text-ember-500/50 italic font-serif">No descendants recorded in this ledger.</span>`;
                        } else {
                            w.children.forEach(cId => {
                                html += createNodeCard(cId, 'Child');
                            });
                        }
                        html += `</div></div>`;
                    });
                    html += `</div></div>`;
                }

                if (!member.wives && member.gen === 3) {
                    html += `
                        <div class="mt-12 text-center text-ember-500/50 italic text-sm font-serif">
                            End of documented lineage for this branch.
                        </div>
                    `;
                }

                canvas.innerHTML = html;
                
                requestAnimationFrame(() => {
                    canvas.classList.remove('fade-out');
                    canvas.classList.add('fade-in');
                });
            }, 400);
        }

        function createNodeCard(id, label) {
            const m = familyData[id];
            if(!m) return '';
            return `
                <div onclick="renderFocusNode('${id}')" class="glass-card px-6 py-4 cursor-pointer text-center w-36 md:w-44 flex flex-col items-center justify-center group rounded-2xl">
                    <h4 class="font-serif text-lg font-bold text-white group-hover:text-ember-400 transition-colors leading-tight">${m.name.split(' ')[0]}</h4>
                    <span class="text-[9px] uppercase tracking-widest text-ember-500/70 mt-2 font-semibold block">Gen ${m.gen}</span>
                </div>
            `;
        }

        function toggleHouse(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                el.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        }

        /* 2. COMPLETE REGISTRY */
        function updateDirectory() {
            const query = document.getElementById('dir-search').value.toLowerCase();
            const sort = document.getElementById('dir-sort').value;
            const grid = document.getElementById('registry-grid');
            
            let arr = Object.values(familyData).filter(m => 
                m.name.toLowerCase().includes(query) || 
                (m.mother && m.mother.toLowerCase().includes(query)) ||
                (m.father && m.father.toLowerCase().includes(query))
            );

            if(sort === 'az') arr.sort((a,b) => a.name.localeCompare(b.name));
            else arr.sort((a,b) => a.gen - b.gen);

            grid.innerHTML = '';
            if(arr.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-ember-500/60 font-serif italic">No ancestors found matching "${query}".</div>`;
                return;
            }

            arr.forEach(m => {
                grid.innerHTML += `
                    <div onclick="renderFocusNode('${m.id}'); switchTab('explorer');" class="glass-card rounded-2xl p-5 cursor-pointer group">
                        <div class="flex justify-between items-start mb-3 border-b border-ember-500/10 pb-3">
                            <h4 class="font-serif font-bold text-lg text-white group-hover:text-ember-400 transition-colors">${m.name}</h4>
                            <span class="bg-ember-900/40 text-ember-200 border border-ember-500/30 text-[9px] font-bold px-2 py-0.5 rounded-full uppercase tracking-widest">Gen ${m.gen}</span>
                        </div>
                        <div class="text-xs text-ember-100/70 space-y-2">
                            <p class="flex justify-between"><span>Father:</span> <span class="text-white font-medium">${m.father || 'Unknown'}</span></p>
                            <p class="flex justify-between"><span>Mother:</span> <span class="text-white font-medium">${m.mother ? m.mother.split('(')[0] : 'Unknown'}</span></p>
                        </div>
                    </div>
                `;
            });
        }

        /* Notes Management */
        function saveActiveNote() {
            if (currentActiveDossierId) {
                const noteText = document.getElementById('modal-note-area').value;
                localStorage.setItem(`note_${currentActiveDossierId}`, noteText);
            }
        }

        function clearActiveNote() {
            if (currentActiveDossierId) {
                document.getElementById('modal-note-area').value = '';
                localStorage.removeItem(`note_${currentActiveDossierId}`);
            }
        }
    </script>
