            "rose": { id: "rose", name: "Rose", gen: 3, father: "philemon", mother: "Ma Nyembezi", house: 3 }, "hopewell": { id: "hopewell", name: "Hopewell", gen: 3, father: "philemon", mother: "MaSibanda", house: 3 }, "irine": { id: "irine", name: "Irine", gen: 3, father: "philemon", mother: "MaSibanda", house: 3 }, "charm": { id: "charm", name: "Charm", gen: 3, father: "philemon", mother: "MaSibanda", house: 3 }, "thembinkosi": { id: "thembinkosi", name: "Thembinkosi", gen: 3, father: "philemon", mother: "MaSibanda", house: 3 }, "doughton": { id: "doughton", name: "Doughton", gen: 3, father: "philemon", mother: "MaSibanda", house: 3 }, "danford": { id: "danford", name: "Danford", gen: 3, father: "philemon", mother: "MaSibanda", house: 3 }, "brighton": { id: "brighton", name: "Brighton", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "simangaliphi": { id: "simangaliphi", name: "Simangaliphi", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "silindelumusa": { id: "silindelumusa", name: "Silindelumusa", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "sikhathele": { id: "sikhathele", name: "Sikhathele", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "ntombizodwa": { id: "ntombizodwa", name: "Ntombizodwa", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "xolani": { id: "xolani", name: "Xolani", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "cleopas": { id: "cleopas", name: "Cleopas", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "last": { id: "last", name: "Last", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "painford": { id: "painford", name: "Painford", gen: 3, father: "philemon", mother: "MaDube", house: 3 }, "onias": { id: "onias", name: "Onias", gen: 3, father: "philemon", mother: "MaNyathi", house: 3 }, "bowen": { id: "bowen", name: "Bowen", gen: 3, father: "philemon", mother: "MaNyathi", house: 3 }, "tholakele": { id: "tholakele", name: "Tholakele", gen: 3, father: "philemon", mother: "MaNyathi", house: 3 }, "siduduzile": { id: "siduduzile", name: "Siduduzile", gen: 3, father: "philemon", mother: "MaNyathi", house: 3 }, "sithulisiwe": { id: "sithulisiwe", name: "Sithulisiwe", gen: 3, father: "philemon", mother: "MaNyathi", house: 3 }, "obvious": { id: "obvious", name: "Obvious", gen: 3, father: "philemon", mother: "MaNyathi", house: 3 }, "mkhululi": { id: "mkhululi", name: "Mkhululi", gen: 3, father: "philemon", mother: "Ma Moyo", house: 3 }
        };

        let currentActiveDossierId = null;
        let saveTimeout;

        /* INITIALIZATION */
        window.onload = function() {
            renderFocusNode('mtalisi');
            updateDirectory();
        };

        /* TAB NAVIGATION SYSTEM */
        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('bg-nd-cyan', 'text-navy-950', 'shadow-lg');
                el.classList.add('text-slate-300', 'hover:bg-slate-700');
            });
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            const btn = document.getElementById(`tab-${tabId}`);
            btn.classList.add('bg-nd-cyan', 'text-navy-950', 'shadow-lg');
            btn.classList.remove('text-slate-300', 'hover:bg-slate-700');
        }

        /* 1. LINEAGE FOCUS EXPLORER */
        function renderFocusNode(memberId) {
            const canvas = document.getElementById('focus-canvas');
            const member = familyData[memberId];
            if(!member) return;

            currentActiveDossierId = memberId;

            canvas.classList.remove('fade-in');
            canvas.classList.add('fade-out');

            setTimeout(() => {
                let html = '';
                const hStyle = member.house !== undefined && member.house !== "all" ? houseColors[member.house] : houseColors[4];

                // A. PARENTS TIER
                if(member.father) {
                    const fatherObj = familyData[member.father];
                    html += `
                        <div class="flex flex-col items-center relative z-10 w-full">
                            <h3 class="text-[10px] font-bold uppercase tracking-[0.3em] text-slate-400 mb-6 border-b border-slate-700 pb-2">Izimpande <span class="text-slate-500 font-sans tracking-normal">(Roots)</span></h3>
                            <div class="flex gap-6 md:gap-12 justify-center relative w-full max-w-2xl conn-bracket">
                                ${fatherObj ? 
                                    createNodeCard(fatherObj.id, 'Father') : 
                                    `<div class="bg-navy-800 border border-slate-700 rounded-2xl px-6 py-4 text-center opacity-60"><span class="block font-serif text-lg text-white">${member.father}</span><span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block mt-1">Ubaba (Father)</span></div>`
                                }
                                ${member.mother ? 
                                    `<div class="bg-navy-800 border border-slate-700 rounded-2xl px-6 py-4 text-center opacity-60"><span class="block font-serif text-lg text-white">${member.mother}</span><span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block mt-1">Umama (Mother)</span></div>` : ''
                                }
                                <div class="conn-line-down"></div>
                            </div>
                        </div>
                    `;
                }

                // B. FOCUS TIER (WARRIOR + SELF + NOTES)
                html += `<div class="flex flex-col items-center relative z-20 mt-4 w-full">`;
                html += `<div class="flex flex-col md:flex-row items-center justify-center gap-6 ${member.father ? 'conn-line-up' : ''} ${member.wives ? 'conn-line-down' : ''} w-full max-w-5xl">`;
                
                const genRoman = member.gen === 1 ? 'I' : member.gen === 2 ? 'II' : 'III';
                const savedNote = localStorage.getItem(`note_${memberId}`) || '';

                html += `
                    <div class="flex flex-col md:flex-row bg-navy-800 border border-slate-600 rounded-[2rem] shadow-2xl w-full max-w-4xl overflow-hidden relative z-30 transform scale-105">
                        
                        <!-- Left Side: Warrior Portrait & Name -->
                        <div class="md:w-2/5 bg-slate-200 flex flex-col items-center justify-center p-8 relative border-b md:border-b-0 md:border-r border-slate-600">
                            <!-- NDEBELE WARRIOR PICTURE -->
                            <img src="ndebele warrior attire - Google Search.png" alt="Warrior Portrait" class="w-full h-48 object-contain drop-shadow-2xl relative z-10 mb-4">
                            
                            <div class="text-center relative z-10 w-full">
                                <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600 mb-1 block">Isizukulwane ${genRoman}</span>
                                <h2 class="font-serif text-3xl font-bold text-slate-900 leading-tight">${member.name}</h2>
                                ${member.id === 'mtalisi' ? `<span class="bg-navy-950 text-white text-[10px] px-3 py-1 rounded-full uppercase tracking-widest font-bold mt-3 inline-block shadow-md">The Patriarch</span>` : ''}
                            </div>
                        </div>
                        
                        <!-- Right Side: Personal Ledger -->
                        <div class="md:w-3/5 bg-navy-800 p-6 md:p-8 flex flex-col relative">
                            <div class="absolute inset-0 opacity-20 pointer-events-none ${hStyle.bg}"></div>
                            <div class="relative z-10 flex flex-col h-full">
                                <div class="flex justify-between items-center mb-4">
                                    <label class="text-xs font-bold uppercase tracking-widest text-nd-cyan">Amarekhodi <span class="text-[10px] text-slate-400 normal-case tracking-normal">(Personal Ledger)</span></label>
                                    <span class="text-[10px] text-slate-500 font-bold uppercase bg-navy-950 px-2 py-0.5 rounded border border-slate-700">Local Storage</span>
                                </div>
                                
                                <textarea id="modal-note-area" oninput="saveActiveNote()" placeholder="Enter deceased location, dates, or memories..." class="w-full flex-grow min-h-[120px] bg-navy-950 border border-slate-600 rounded-xl p-4 text-sm font-serif text-slate-200 focus:outline-none resize-none shadow-inner placeholder-slate-600 transition-all focus:ring-2 focus:ring-nd-cyan">${savedNote}</textarea>
                                
                                <div class="flex justify-between items-center mt-3">
                                    <span id="save-indicator" class="text-[10px] text-nd-green font-bold uppercase opacity-0 transition-opacity bg-navy-900 px-2 rounded border border-nd-green/50">Saved automatically</span>
                                    <button onclick="clearActiveNote()" class="text-[10px] text-slate-400 hover:text-nd-red font-bold transition-colors uppercase tracking-wider">Erase Ledger</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                html += `</div></div>`;

                // C. CHILDREN TIER (Categorized by House)
                if (member.wives && member.wives.length > 0) {
                    html += `<div class="flex flex-col items-center w-full mt-16 relative z-10">`;
                    html += `<h3 class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400 mb-8 border-b border-slate-700 pb-2">Indlu <span class="text-slate-500 font-sans tracking-normal">(Lineage by House)</span></h3>`;
                    html += `<div class="flex flex-col gap-10 w-full max-w-5xl">`;
                    
                    member.wives.forEach((w, wIdx) => {
                        const wifeId = `wife-${member.id}-${wIdx}`;
                        const blockStyle = houseColors[wIdx % 4];
                        
                        html += `
                            <div class="bg-navy-900/80 border border-slate-700 rounded-[2rem] p-6 md:p-8 shadow-lg">
                                <div onclick="toggleHouse('${wifeId}')" class="${blockStyle.bg} border-l-4 ${blockStyle.border} bg-navy-800 px-6 py-4 flex items-center justify-between cursor-pointer transition-all mb-8 w-full md:w-max mx-auto group rounded-xl shadow-md">
                                    <div class="flex items-center gap-4">
                                        <div class="text-left">
                                            <span class="text-[10px] uppercase tracking-widest ${blockStyle.text} font-bold block mb-0.5 opacity-80">Umama (Mother)</span>
                                            <span class="font-serif font-bold text-white text-xl md:text-2xl tracking-wide">${w.name}</span>
                                        </div>
                                    </div>
                                    <svg id="icon-${wifeId}" class="ml-8 w-6 h-6 ${blockStyle.text} transition-transform transform rotate-180" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
                                </div>

                                <div id="${wifeId}" class="flex flex-wrap justify-center gap-4 md:gap-6 transition-all">
                        `;
                        if(w.children.length === 0) {
                             html += `<span class="text-sm font-serif italic text-slate-500">No descendants recorded</span>`;
                        } else {
                            w.children.forEach(cId => {
                                html += createNodeCard(cId);
                            });
                        }
                        html += `</div></div>`;
                    });
                    html += `</div></div>`;
                }

                if (!member.wives && member.gen === 3) {
                    html += `
                        <div class="mt-12 text-center text-slate-500 font-serif italic bg-navy-800 px-6 py-3 rounded-xl border border-slate-700 shadow-sm">
                            End of documented lineage for this branch.
                        </div>
                    `;
                }

                canvas.innerHTML = html;
                
                requestAnimationFrame(() => {
                    canvas.classList.remove('fade-out');
                    canvas.classList.add('fade-in');
                });
            }, 300);
        }

        function createNodeCard(id) {
            const m = familyData[id];
            if(!m) return '';
            const cStyle = m.house !== undefined && m.house !== "all" ? houseColors[m.house] : houseColors[4];
            return `
                <div onclick="renderFocusNode('${id}')" class="bg-navy-800 border border-slate-600 px-6 py-5 cursor-pointer text-center w-36 md:w-44 flex flex-col items-center justify-center group relative overflow-hidden rounded-2xl shadow-sm hover:shadow-xl hover:border-nd-cyan transition-all transform hover:-translate-y-1">
                    <div class="absolute top-0 left-0 w-full h-1 ${cStyle.bg} border-b ${cStyle.border}"></div>
                    <h4 class="font-serif text-xl font-bold text-white group-hover:text-nd-cyan transition-colors leading-tight mt-1">${m.name.split(' ')[0]}</h4>
                    <span class="text-[10px] uppercase tracking-widest text-slate-400 mt-2 font-bold block">Gen ${m.gen}</span>
                </div>
            `;
        }

        function toggleHouse(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                el.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        }

        /* 2. COMPLETE REGISTRY */
        function updateDirectory() {
            const query = document.getElementById('dir-search').value.toLowerCase();
            const sort = document.getElementById('dir-sort').value;
            const grid = document.getElementById('registry-grid');
            
            let arr = Object.values(familyData).filter(m => 
                m.name.toLowerCase().includes(query) || 
                (m.mother && m.mother.toLowerCase().includes(query)) ||
                (m.father && m.father.toLowerCase().includes(query))
            );

            if(sort === 'az') arr.sort((a,b) => a.name.localeCompare(b.name));
            else arr.sort((a,b) => a.gen - b.gen);

            grid.innerHTML = '';
            if(arr.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-slate-500 font-serif italic">No ancestors found matching "${query}".</div>`;
                return;
            }

            arr.forEach(m => {
                const cStyle = m.house !== undefined && m.house !== "all" ? houseColors[m.house] : houseColors[4];
                grid.innerHTML += `
                    <div onclick="renderFocusNode('${m.id}'); switchTab('explorer');" class="bg-navy-800 hover:bg-slate-800 border border-slate-700 hover:border-nd-cyan p-5 cursor-pointer group relative overflow-hidden rounded-2xl shadow-sm transition-all">
                        <div class="absolute top-0 left-0 w-full h-1 ${cStyle.bg} border-b ${cStyle.border}"></div>
                        <div class="flex justify-between items-start mb-3 border-b border-slate-700 pb-3 mt-1">
                            <h4 class="font-serif font-bold text-lg text-white group-hover:text-nd-cyan transition-colors">${m.name}</h4>
                            <span class="bg-navy-950 text-slate-300 text-[10px] font-bold px-2 py-0.5 border border-slate-700 rounded uppercase tracking-widest shadow-sm">Gen ${m.gen}</span>
                        </div>
                        <div class="text-xs text-slate-400 font-medium space-y-1.5 opacity-90">
                            <p class="flex justify-between"><span>Ubaba:</span> <span class="text-slate-200">${m.father || 'Unknown'}</span></p>
                            <p class="flex justify-between"><span>Umama:</span> <span class="text-slate-200">${m.mother ? m.mother.split('(')[0] : 'Unknown'}</span></p>
                        </div>
                    </div>
                `;
            });
        }

        /* Notes Management */
        function saveActiveNote() {
            if (currentActiveDossierId) {
                const noteText = document.getElementById('modal-note-area').value;
                localStorage.setItem(`note_${currentActiveDossierId}`, noteText);
                
                const indicator = document.getElementById('save-indicator');
                if (indicator) {
                    clearTimeout(window.saveTimeout);
                    indicator.classList.remove('save-indicator');
                    indicator.style.opacity = '1';
                    
                    window.saveTimeout = setTimeout(() => {
                        indicator.classList.add('save-indicator');
                    }, 500);
                }
            }
        }

        function clearActiveNote() {
            if (currentActiveDossierId) {
                document.getElementById('modal-note-area').value = '';
                localStorage.removeItem(`note_${currentActiveDossierId}`);
            }
        }
    </script>
</body>
</html>
